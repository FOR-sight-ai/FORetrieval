services:
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.25
    container_name: ${MILVUS_ETCD_CONTAINER_NAME:-rag-db-milvus-etcd}
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: 1000
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
      ETCD_SNAPSHOT_COUNT: 50000
    command:
      - etcd
      - -advertise-client-urls=http://milvus-etcd:2379
      - -listen-client-urls
      - http://0.0.0.0:2379
      - --data-dir
      - /etcd
    volumes:
      - ${MILVUS_ETCD_PATH:-./volumes/etcd}:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - rag-network

  milvus-minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    container_name: ${MILVUS_MINIO_CONTAINER_NAME:-rag-db-milvus-minio}
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command:
      - minio
      - server
      - /minio_data
      - --console-address
      - :9001
    ports:
      - "${MILVUS_MINIO_API_PORT:-9000}:9000"
      - "${MILVUS_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ${MILVUS_MINIO_PATH:-./volumes/minio}:/minio_data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - rag-network

  milvus-standalone:
    image: milvusdb/milvus:${MILVUS_VERSION:-v2.6.15}
    container_name: ${MILVUS_STANDALONE_CONTAINER_NAME:-rag-db-milvus}
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_HEALTH_PORT:-9091}:9091"
    volumes:
      - ${MILVUS_STORAGE_PATH:-./volumes/milvus}:/var/lib/milvus
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    networks:
      - rag-network

networks:
  rag-network:
    external: true
